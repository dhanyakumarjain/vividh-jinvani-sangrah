<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicBox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-scheme="spotify" data-mode="dark">

  <div class="player">
    <div class="player-header">
      <div class="player-title-wrap">
        <div class="player-title-row">
          <img class="player-logo" id="playerLogo" src="" alt="logo" style="display:none">
          <h1 class="player-title" id="playerTitle">&#9835;</h1>
        </div>
        <p class="player-subtitle" id="playerSubtitle"></p>
      </div>
      <button class="icon-btn" id="btnSettings" title="Settings">&#9881;</button>
    </div>

    <div class="now-playing">
      <p class="label">Now Playing</p>
      <p class="song-name" id="songName">&mdash;</p>
    </div>

    <audio id="audio"></audio>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
      <input type="range" class="progress-input" id="progressInput" min="0" max="1000" value="0" step="1">
    </div>
    <div class="time-info">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn small" id="btnRepeat" title="Repeat">&#8635;</button>
      <button class="ctrl-btn" id="btnPrev" title="Previous">&#9664;&#9664;</button>
      <button class="ctrl-btn play-btn" id="btnPlay" title="Play">&#9654;</button>
      <button class="ctrl-btn" id="btnNext" title="Next">&#9654;&#9654;</button>
      <button class="ctrl-btn small" id="btnShuffle" title="Shuffle">&#8652;</button>
    </div>

    <div class="volume-row">
      <button class="icon-btn" id="btnVolume" title="Mute">&#128266;</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
    </div>

    <div class="tabs">
      <button class="tab active" data-view="library">All</button>
      <button class="tab" data-view="favorites">&#9829;</button>
      <button class="tab" data-view="recent">Recent</button>
      <div class="tab-dd-wrap">
        <button class="tab" id="tabPlaylists" data-view="playlist">Playlists &#9662;</button>
        <div class="tab-dropdown" id="playlistDropdown">
          <div id="ddPlaylistList"></div>
          <button class="dd-item dd-new" id="btnNewPlaylist">+ New Playlist</button>
        </div>
      </div>
    </div>

    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="Search songs...">
    </div>

    <ul class="playlist-list" id="songList"></ul>

    <p class="error" id="errorMsg"></p>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="icon-btn modal-close" data-close="settingsModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="s-section">
          <h4>Theme</h4>
          <div class="theme-options" id="themeOptions"></div>
        </div>
        <div class="s-section">
          <h4>Mode</h4>
          <div class="mode-toggle">
            <button class="mode-btn" data-mode="light">&#9728; Light</button>
            <button class="mode-btn active" data-mode="dark">&#9790; Dark</button>
          </div>
        </div>
        <div class="s-section">
          <h4>Data</h4>
          <div class="data-btns">
            <button class="btn" id="btnExport">&#8595; Export</button>
            <button class="btn" id="btnImport">&#8593; Import</button>
            <input type="file" id="importFile" accept=".json" hidden>
          </div>
          <p class="hint">Export/import favorites, playlists, history &amp; preferences.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Add to Playlist Modal -->
  <div class="modal-overlay" id="addToPlaylistModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Add to Playlist</h3>
        <button class="icon-btn modal-close" data-close="addToPlaylistModal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="playlistCheckboxes"></div>
        <button class="btn btn-link" id="btnCreateFromModal">+ Create New Playlist</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="btnDoneAddToPlaylist">Done</button>
      </div>
    </div>
  </div>

  <!-- Playlist Name Modal -->
  <div class="modal-overlay" id="playlistNameModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 id="playlistNameTitle">New Playlist</h3>
        <button class="icon-btn modal-close" data-close="playlistNameModal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" class="input" id="playlistNameInput" placeholder="Playlist name...">
      </div>
      <div class="modal-footer">
        <button class="btn" data-close="playlistNameModal">Cancel</button>
        <button class="btn btn-primary" id="btnSavePlaylistName">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal-overlay" id="confirmDeleteModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Delete Playlist</h3>
        <button class="icon-btn modal-close" data-close="confirmDeleteModal">&times;</button>
      </div>
      <div class="modal-body">
        <p>Delete "<span id="deletePlaylistName"></span>"?</p>
      </div>
      <div class="modal-footer">
        <button class="btn" data-close="confirmDeleteModal">Cancel</button>
        <button class="btn btn-danger" id="btnConfirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <div class="context-menu" id="contextMenu"></div>

  <script src="script.js"></script>
</body>
</html>
