<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Test - Vividh Jinvani Sangrah</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        h1 { color: #1DB954; }
        h2 { color: #FFD700; margin-top: 30px; }
        .info { 
            background: #16213e; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 10px 0;
        }
        .success { color: #1DB954; }
        .error { color: #ff4444; }
        .warning { color: #ffaa00; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            background: #16213e;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        th {
            background: #0f3460;
            color: #1DB954;
        }
        .btn {
            background: #1DB954;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #1ED760;
        }
        pre {
            background: #0a0a0a;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🎵 Data Verification Test</h1>
    
    <div class="info">
        <p><strong>Purpose:</strong> This page tests if your browser can load the song data correctly.</p>
        <p><strong>Timestamp:</strong> <span id="timestamp"></span></p>
    </div>

    <button class="btn" onclick="location.reload(true)">🔄 Hard Reload (Clear Cache)</button>
    <button class="btn" onclick="testData()">🧪 Test Data Loading</button>

    <h2>📊 Test Results</h2>
    <div id="results"></div>

    <h2>📁 Songs Data</h2>
    <div id="songsData"></div>

    <h2>📋 Playlists Data</h2>
    <div id="playlistsData"></div>

    <h2>⚙️ Config Data</h2>
    <div id="configData"></div>

    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();

        async function testData() {
            const results = document.getElementById('results');
            const songsDiv = document.getElementById('songsData');
            const playlistsDiv = document.getElementById('playlistsData');
            const configDiv = document.getElementById('configData');

            results.innerHTML = '<p>⏳ Loading data...</p>';

            try {
                // Test config.json
                const configResponse = await fetch('data/config.json?t=' + Date.now());
                const config = await configResponse.json();
                
                // Test songs.json
                const songsResponse = await fetch('data/songs.json?t=' + Date.now());
                const songsData = await songsResponse.json();
                
                // Test playlists.json
                const playlistsResponse = await fetch('data/playlists.json?t=' + Date.now());
                const playlistsData = await playlistsResponse.json();

                // Display results
                const totalSongs = songsData.songs?.length || 0;
                const totalPlaylists = playlistsData.playlists?.length || 0;

                // Remove duplicates (same logic as script.js)
                const uniqueSongs = [];
                const seenFilenames = new Set();
                
                for (const song of songsData.songs || []) {
                    const filename = song.file.split('/').pop();
                    if (!seenFilenames.has(filename)) {
                        seenFilenames.add(filename);
                        uniqueSongs.push(song);
                    }
                }

                results.innerHTML = `
                    <div class="info">
                        <p class="success">✅ All data files loaded successfully!</p>
                        <p><strong>Total Songs in JSON:</strong> ${totalSongs}</p>
                        <p><strong>Unique Songs (after deduplication):</strong> ${uniqueSongs.length}</p>
                        <p><strong>Total Playlists:</strong> ${totalPlaylists}</p>
                        <p><strong>Last Updated:</strong> ${config.lastUpdated || 'N/A'}</p>
                        <p><strong>Title:</strong> ${config.title || 'N/A'}</p>
                        <p><strong>Subtitle:</strong> ${config.subtitle || 'N/A'}</p>
                    </div>
                `;

                // Display songs table
                let songsTable = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ID</th>
                                <th>Title</th>
                                <th>File Path</th>
                                <th>Size (MB)</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                uniqueSongs.forEach((song, index) => {
                    songsTable += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${song.id}</td>
                            <td>${song.title}</td>
                            <td style="font-size: 0.85em; color: #888;">${song.file}</td>
                            <td>${song.size_mb}</td>
                        </tr>
                    `;
                });

                songsTable += '</tbody></table>';
                songsDiv.innerHTML = songsTable;

                // Display playlists table
                let playlistsTable = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Songs Count</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                (playlistsData.playlists || []).forEach((playlist, index) => {
                    playlistsTable += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${playlist.id}</td>
                            <td>${playlist.name}</td>
                            <td>${playlist.songIds?.length || 0}</td>
                        </tr>
                    `;
                });

                playlistsTable += '</tbody></table>';
                playlistsDiv.innerHTML = playlistsTable;

                // Display config
                configDiv.innerHTML = `<pre>${JSON.stringify(config, null, 2)}</pre>`;

            } catch (error) {
                results.innerHTML = `
                    <div class="info">
                        <p class="error">❌ Error loading data: ${error.message}</p>
                        <p>Make sure the server is running and data files exist.</p>
                    </div>
                `;
                console.error('Error:', error);
            }
        }

        // Auto-run test on page load
        window.addEventListener('load', () => {
            testData();
        });
    </script>
</body>
</html>
